name: Cleanup Orphaned Images

on:
  schedule:
    # Runs daily at 2:00 AM UTC
    - cron: '0 2 * * *'
  # Allow manual trigger from the GitHub Actions UI for testing
  workflow_dispatch:

jobs:
  cleanup:
    runs-on: ubuntu-latest
    steps:
      - name: Invoke cleanup edge function
        run: |
          response=$(curl --silent --show-error --fail \
            --max-time 60 \
            -X POST "${{ secrets.SUPABASE_EDGE_FUNCTION_URL }}/cleanup-orphaned-images" \
            -H "Authorization: Bearer ${{ secrets.CLEANUP_SECRET }}" \
            -H "Content-Type: application/json")
          echo "Response: $response"
